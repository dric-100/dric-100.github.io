<!DOCTYPE html>
<html lang='sr'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontakt stranica sajta posvećenog modelu Fiat Panda 100HP. Pošaljite pitanje, sugestiju ili podelite svoje iskustvo sa ovim legendarnim sportskim gradskim automobilom.">
    <meta name="keywords" content="Fiat Panda 100HP">
    <link rel="icon" type="image/png" href="images/tab-icon.png">
    <link rel="shortcut icon" href="images/tab-icon.png">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stil.css">
    <link rel="stylesheet" href="css/prilagodljivo.css">
    <title>Kontakt</title>
</head>
<body>
    <header>
        <img src="images/logo.png" class="logo" alt="100HP logo.">
        <h1 class="hero-naslov">Fiat Panda 100HP</h1>
        <div class="kontrole">
            <button id="temaDugme">Tema</button>
            <button id="fontUvecaj">Font+</button>
            <button id="fontUmanji">Font-</button>
        </div>
        <div class="hamburger-dugme">☰</div>
            <ul class="meni">
                <li><a href="index.html">Početna</a></li>
                <li><a href="nastanak.html">Nastanak "stotke"</a></li>
                <li class="padajuci-meni">
                    <p>Specifikacije</p>
                    <ul class="sadrzaj-padajuceg-menija">
				        <li><a href="specifikacije100.html">Panda 100HP</a></li>
                    </ul>
                </li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </div>
    </header>
    <h2 class="container mt-4">Da li Vam se dopao sadržaj? Imate pitanja? Kontaktirajte nas!</h2>
    <form id='kontaktForma'>
        <label for='ime'>Ime:</label>
        <input type='text' id='ime' required minlength='2' placeholder='Ime'>
        <label for='email'>Email:</label>
        <input type='email' id='email' required placeholder='Email'>
        <label for='poruka'>Poruka:</label>
        <textarea id='poruka' required></textarea>
        <button type='submit'>Pošalji</button>
    </form>
    <p id='lokacija'>Lokacija sedišta Fiata: FCA Italy, Torino, Italy</p>
    <iframe src='https://www.google.com/maps?q=Fiat+Mirafiori+Torino&output=embed' width='100%' height='400'></iframe>
    <script src='js/skripta.js'></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src='js/validacija.js'></script>
</body>
</html>
